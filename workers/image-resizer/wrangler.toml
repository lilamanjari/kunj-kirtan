name = "kunjkirtans-image-resizer"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[vars]
# Point this at the public origin that serves the original full-size files.
# Keep it different from the Worker route itself to avoid request loops.
ORIGINAL_IMAGES_BASE_URL = "https://origin-img.kunjkirtans.com"

[[routes]]
pattern = "img.kunjkirtans.com"
custom_domain = true
